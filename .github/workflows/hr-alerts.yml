name: MLB Home Run Discord Alerts

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-hrs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run HR bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hr_bot.py

      - name: Save seen HRs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_hrs.json || true
          git commit -m "Update seen HRs" || echo "No changes to commit"
          git push
