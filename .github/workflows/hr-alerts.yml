name: MLB Home Run Discord Alerts

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hr-alerts
  cancel-in-progress: false

jobs:
  check-hrs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Create state file if missing
        run: |
          if [ ! -f seen_hrs.json ]; then echo "[]" > seen_hrs.json; fi

      - name: Run HR bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hr_bot.py

      - name: Save seen HRs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_hrs.json
          git commit -m "Update seen HRs" || echo "No changes to commit"
          git push
